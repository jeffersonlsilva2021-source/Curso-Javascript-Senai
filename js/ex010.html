<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ex 10</h1>  


    <script>

        let nomeAluno = window.prompt("Digite o nome do aluno:")

        let nota1 = Number(window.prompt("Digite a nota 1:"))
        let nota2 = Number(window.prompt("Digite a nota 2:"))
        let nota3 = Number(window.prompt("Digite a nota 3:"))
       
        let media = (nota1 + nota2 + nota3) / 3

        window.alert(`A média do aluno ${nomeAluno} foi: ${media.toFixed(1)}`)

    </script>  
</body>
</html>
