<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        header{
            background-color: lightgray;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            height: 100px;
            align-items: center;
        }

        nav{
            /* background-color: lightgreen; */
            width: 450px;
        }

        ul{
            display: flex;
            list-style-type: none;
            justify-content: space-around;
        }

        section{
            background-color: lightskyblue;
            height: 300px;
            display: flex;

            justify-content: center;
            align-items: center;
        }

        #card{
            background-color: red;
            width: 100px;
            height: 100px;
            color: white;
            font-size: 18px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

    </style>
</head>
<body>
    
    <header>
        <div>
            LOGO
        </div>

        <nav>
            <ul>
                <li><a href="https://web.facebook.com">Home</a></li>
                <li>Produtos</li>
                <li>Contatos</li>
                <li>Sobre</li>
            </ul>
        </nav>
    </header>

    <section>
        <div id="card">
            Noticia
        </div>
    </section>

</body>
</html>
